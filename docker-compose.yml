version: '3.9'

services:
  backend:
    build: ./backend
    volumes:
      - ./backend/app:/app/app
      - db_data:/app
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
